model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_context_window = 400000
model_auto_compact_token_limit = 400000

sandbox_mode = "read-only"
approval_policy = "never"
web_search = "disabled"

[features]
codex_hooks = true
browser_use = false
in_app_browser = false
computer_use = false
apps = false

[[hooks.Stop]]
[[hooks.Stop.hooks]]
type = "command"
command = "__LEANMARATHON_PYTHON__ __WORKTREE__/.codex/hooks/ralph_wiggum_stop.py --config-dir __WORKTREE__ --workspace-dir __WORKTREE__"
timeout = 7500
statusMessage = "Checking delivery"

[mcp_servers.lean-explore]
command = "lean-explore"
args = ["mcp", "serve", "--backend", "local"]
startup_timeout_sec = 120
tool_timeout_sec = 600
default_tools_approval_mode = "approve"

[mcp_servers.lean-lsp-mcp]
command = "__LEANMARATHON_PYTHON__"
args = ["-m", "lean_lsp_mcp", "--lean-project-path", "__LEANMARATHON_ROOT__/lakefile.toml", "--repl", "--repl-timeout", "600"]
startup_timeout_sec = 120
tool_timeout_sec = 600
enabled_tools = ["lean_diagnostic_messages", "lean_goal", "lean_multi_attempt", "lean_profile_proof"]
default_tools_approval_mode = "approve"

[mcp_servers.lean-lsp-mcp.env]
PATH = "__LEANMARATHON_PATH__"

[mcp_servers.github]
command = "github-mcp-server"
args = ["stdio"]
env_vars = ["GITHUB_PERSONAL_ACCESS_TOKEN", "GITHUB_TOKEN"]
enabled_tools = ["create_pull_request", "issue_write"]
default_tools_approval_mode = "approve"

[mcp_servers.github.env]
GITHUB_TOOLSETS = "context"
GITHUB_TOOLS = "create_pull_request,issue_write"
GITHUB_EXCLUDE_TOOLS = "get_me,get_teams,get_team_members"

[mcp_servers.git]
command = "git-mcp-server"
args = []
enabled_tools = ["git_set_working_dir", "git_add", "git_commit", "git_push"]
default_tools_approval_mode = "approve"

[mcp_servers.git.env]
PATH = "__LEANMARATHON_PATH__"
MCP_TRANSPORT_TYPE = "stdio"
GIT_BASE_DIR = "__WORKTREE__"
GIT_CONFIG_COUNT = "4"
GIT_CONFIG_KEY_0 = "core.hooksPath"
GIT_CONFIG_VALUE_0 = "/dev/null"
GIT_CONFIG_KEY_1 = "credential.helper"
GIT_CONFIG_VALUE_1 = ""
GIT_CONFIG_KEY_2 = "core.fsmonitor"
GIT_CONFIG_VALUE_2 = "false"
GIT_CONFIG_KEY_3 = "protocol.file.allow"
GIT_CONFIG_VALUE_3 = "never"
GIT_TERMINAL_PROMPT = "0"

[mcp_servers.apply-patch]
command = "__LEANMARATHON_PYTHON__"
args = ["__LEANMARATHON_APPLY_PATCH_MCP__"]
startup_timeout_sec = 120
tool_timeout_sec = 600
enabled_tools = ["apply_patch"]
default_tools_approval_mode = "approve"

[mcp_servers.apply-patch.env]
APPLY_PATCH_WORKSPACE = "__WORKTREE__"
APPLY_PATCH_TARGET_FILE = "LeanMarathon/Main.lean"
APPLY_PATCH_OTHER_FILES = '["docs/state.md","docs/delivery.yml"]'
APPLY_PATCH_NODE = "weighted_tail_bound_polynomial"
PYTHONUTF8 = "1"

[mcp_servers.dag-tracker]
command = "__LEANMARATHON_PYTHON__"
args = ["__LEANMARATHON_DAG_TRACKER_MCP__"]
startup_timeout_sec = 120
tool_timeout_sec = 600
enabled_tools = ["parent_nodes", "child_nodes", "global_definitional_context"]
default_tools_approval_mode = "approve"

[mcp_servers.dag-tracker.env]
DAG_PROJECT_ROOT = "__LEANMARATHON_ROOT__"
DAG_TARGET_FILE = "__DAG_TARGET_FILE__"
PATH = "__LEANMARATHON_PATH__"
PYTHONUTF8 = "1"
